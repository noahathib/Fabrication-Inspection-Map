<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fabrication Inspection Bid Tracker — US & Canada</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f0ec;--surface:#fff;--surface2:#f8f7f4;--border:#e2ddd6;--border2:#cdc6bb;
  --text:#1a1612;--muted:#7a726a;--muted2:#b0a89e;
  --bridge:#c0392b;--shop:#1a6b3c;--oncall:#1d4e8f;--ndt:#7d3c98;
  --civil:#b7611a;--transit:#0e6655;--federal:#8b4513;--canada:#8b0000;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
header{background:var(--text);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;flex-shrink:0;z-index:1100}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;background:#c0392b;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:11px;color:#fff;letter-spacing:.5px;flex-shrink:0}
.brand-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:#fff;letter-spacing:.3px;line-height:1}
.brand-sub{font-family:'IBM Plex Mono',monospace;font-size:9px;color:#7a726a;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.hstats{display:flex;gap:0}
.hs{padding:0 14px;border-right:1px solid #2e2b27;text-align:center}
.hs:last-child{border-right:none}
.hs-n{font-family:'Syne',sans-serif;font-weight:700;font-size:17px;color:#fff;line-height:1}
.hs-l{font-family:'IBM Plex Mono',monospace;font-size:8px;color:#7a726a;letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.updated{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#5a5450;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.live-dot{width:6px;height:6px;border-radius:50%;background:#1a6b3c;animation:blink 2s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* LAYOUT */
.app{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sb{width:355px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-top{padding:12px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface2)}
.sw{position:relative;margin-bottom:10px}
.sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted2)}
#si{width:100%;padding:7px 9px 7px 28px;border:1px solid var(--border2);border-radius:5px;background:var(--surface);font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--text);outline:none}
#si:focus{border-color:#1d4e8f;box-shadow:0 0 0 2px #e8f0fc}
#si::placeholder{color:var(--muted2)}
.ftabs{display:flex;gap:4px;flex-wrap:wrap}
.ft{font-family:'IBM Plex Mono',monospace;font-size:9.5px;padding:3px 8px;border-radius:3px;border:1px solid var(--border2);background:var(--surface);color:var(--muted);cursor:pointer;letter-spacing:.3px;transition:all .12s;white-space:nowrap}
.ft:hover{border-color:var(--text);color:var(--text)}
.ft.active{background:var(--text);border-color:var(--text);color:#fff}
.ft[data-cat="bridge"].active{background:var(--bridge);border-color:var(--bridge)}
.ft[data-cat="shop"].active{background:var(--shop);border-color:var(--shop)}
.ft[data-cat="oncall"].active{background:var(--oncall);border-color:var(--oncall)}
.ft[data-cat="ndt"].active{background:var(--ndt);border-color:var(--ndt)}
.ft[data-cat="civil"].active{background:var(--civil);border-color:var(--civil)}
.ft[data-cat="transit"].active{background:var(--transit);border-color:var(--transit)}
.ft[data-cat="federal"].active{background:var(--federal);border-color:var(--federal)}
.ft[data-cat="canada"].active{background:var(--canada);border-color:var(--canada)}

.leg{padding:7px 14px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0;background:var(--surface)}
.li{display:flex;align-items:center;gap:4px;font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:var(--muted);letter-spacing:.2px}
.ld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cbar{padding:5px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--muted);letter-spacing:.5px;flex-shrink:0}
.pl{overflow-y:auto;flex:1}
.pl::-webkit-scrollbar{width:3px}
.pl::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* CARDS */
.pc{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;position:relative}
.pc:hover{background:var(--surface2)}
.pc.active{background:#f0f4fb}
.cs{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0;opacity:0;transition:opacity .1s}
.pc.active .cs{opacity:1}
.ch{display:flex;align-items:flex-start;gap:7px;margin-bottom:4px}
.cp{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:500;padding:2px 6px;border-radius:2px;flex-shrink:0;letter-spacing:.5px;margin-top:1px;text-transform:uppercase;color:#fff}
.ct{font-size:12px;font-weight:500;line-height:1.3;color:var(--text)}
.ca{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--muted);margin-bottom:4px}
.cm{display:flex;align-items:center;gap:7px}
.cv{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:500}
.cd{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted)}
.csep{width:2px;height:2px;background:var(--muted2);border-radius:50%}

/* MAP */
#map{flex:1}

/* POPUP */
.leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border2)!important;border-radius:10px!important;box-shadow:0 8px 40px rgba(0,0,0,.18),0 2px 8px rgba(0,0,0,.08)!important;padding:0!important}
.leaflet-popup-content{margin:0!important;width:auto!important}
.leaflet-popup-tip-container{display:none}
.leaflet-popup-close-button{color:var(--muted)!important;font-size:17px!important;top:8px!important;right:8px!important;z-index:10}
.pop{min-width:310px;max-width:360px;font-family:'IBM Plex Sans',sans-serif}
.ptop{padding:14px 16px 12px;border-bottom:1px solid var(--border)}
.pcr{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.pcb{font-family:'IBM Plex Mono',monospace;font-size:8.5px;font-weight:500;padding:2px 7px;border-radius:2px;text-transform:uppercase;letter-spacing:.5px;color:#fff}
.pid{font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--muted);letter-spacing:.2px}
.ptitle{font-family:'Syne',sans-serif;font-weight:600;font-size:13px;line-height:1.3;color:var(--text);margin-bottom:4px;padding-right:16px}
.pagency{font-size:11px;color:var(--muted);line-height:1.4}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.pcel{padding:9px 16px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.pcel:nth-child(even){border-right:none}
.pcel:nth-last-child(-n+2){border-bottom:none}
.pcel label{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--muted2);letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:2px}
.pcel .v{font-size:12px;font-weight:500;color:var(--text);line-height:1.3}
.pcel .v.money{font-family:'IBM Plex Mono',monospace;font-size:12.5px}
.pdesc{padding:10px 16px;font-size:11px;color:var(--muted);line-height:1.6;border-bottom:1px solid var(--border)}
.ptags{padding:8px 16px 10px;display:flex;gap:4px;flex-wrap:wrap}
.ptag{font-family:'IBM Plex Mono',monospace;font-size:8.5px;padding:2px 6px;border-radius:2px;background:var(--surface2);border:1px solid var(--border2);color:var(--muted);letter-spacing:.2px}
.psrc{padding:6px 16px 10px;font-family:'IBM Plex Mono',monospace;font-size:8.5px;color:var(--muted2);letter-spacing:.2px}
.no-res{padding:35px 16px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);letter-spacing:.5px}
</style>
</head>

// Map init
const map=L.map('map',{center:[46,-98],zoom:4,zoomControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map);

let markers={},activeId=null,curCat='ALL',curQ='';

function icon(cat,active){
  const c=CC[cat],sz=active?16:12,ring=active?32:24;
  return L.divIcon({className:'',iconSize:[ring,ring],iconAnchor:[ring/2,ring/2],popupAnchor:[0,-ring/2-4],
    html:`<div style="position:relative;width:${ring}px;height:${ring}px">
      <div style="position:absolute;inset:0;border-radius:50%;background:${c}18;border:1.5px solid ${c}44;${active?'animation:blink 2s ease-in-out infinite;':''}"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:${sz}px;height:${sz}px;border-radius:50%;background:${c};border:2px solid ${active?'#fff':c+'80'};box-shadow:0 1px ${active?14:6}px ${c}${active?'99':'44'};"></div>
    </div>`
  });
}

function popup(p){
  const c=CC[p.cat],fl=p.co==='CA'?'🍁 ':'';
  return `<div class="pop">
    <div class="ptop">
      <div class="pcr"><span class="pcb" style="background:${c}">${CL[p.cat]}</span><span class="pid">${p.id}</span></div>
      <div class="ptitle">${p.n}</div>
      <div class="pagency">${fl}${p.ag} · ${p.ci}</div>
    </div>
    <div class="pgrid">
      <div class="pcel"><label>Est. Value</label><div class="v money">${p.v}</div></div>
      <div class="pcel"><label>Bid / Proposal Due</label><div class="v">${p.bd}</div></div>
      <div class="pcel"><label>Duration</label><div class="v">${p.du}</div></div>
      <div class="pcel"><label>State/Province</label><div class="v">${p.st} · ${p.co==='CA'?'Canada':'USA'}</div></div>
    </div>
    <div class="pdesc">${p.de}</div>
    <div class="ptags">${p.tg.map(t=>`<span class="ptag">${t}</span>`).join('')}</div>
    <div class="psrc">📋 ${p.src}</div>
  </div>`;
}

function filtered(){
  return P.filter(p=>{
    const catOk=curCat==='ALL'||p.cat===curCat;
    const q=curQ.toLowerCase();
    const txtOk=!q||[p.n,p.ag,p.st,p.ci,p.cat,p.tg.join(' '),p.id].join(' ').toLowerCase().includes(q);
    return catOk&&txtOk;
  });
}

function setActive(id){
  activeId=id;
  P.forEach(p=>{if(markers[p.id])markers[p.id].setIcon(icon(p.cat,p.id===id))});
  document.querySelectorAll('.pc').forEach(c=>c.classList.toggle('active',c.dataset.id===id));
}

function buildList(){
  const list=document.getElementById('pl');
  const f=filtered();
  document.getElementById('cbar').textContent=`${f.length} solicitation${f.length!==1?'s':''} matched`;
  if(!f.length){list.innerHTML='<div class="no-res">No matching projects.</div>';return;}
  list.innerHTML=f.map(p=>`
    <div class="pc${activeId===p.id?' active':''}" data-id="${p.id}">
      <div class="cs" style="background:${CC[p.cat]}"></div>
      <div class="ch"><span class="cp" style="background:${CC[p.cat]}">${CL[p.cat]}</span><div class="ct">${p.n}</div></div>
      <div class="ca">${p.ag} · ${p.st}</div>
      <div class="cm"><span class="cv" style="color:${CC[p.cat]}">${p.v}</span><div class="csep"></div><span class="cd">Due: ${p.bd}</span></div>
    </div>`).join('');
  list.querySelectorAll('.pc').forEach(card=>{
    card.addEventListener('click',()=>{
      const p=P.find(x=>x.id===card.dataset.id);
      if(!p)return;
      setActive(p.id);markers[p.id].openPopup();
      map.flyTo([p.la,p.ln],p.co==='CA'?7:9,{duration:.7});
    });
  });
}

function statsUpdate(){
  document.getElementById('sT').textContent=P.length;
  document.getElementById('sS').textContent=new Set(P.filter(p=>p.co==='US').map(p=>p.st)).size;
  document.getElementById('sP').textContent=new Set(P.filter(p=>p.co==='CA').map(p=>p.st)).size;
  document.getElementById('sA').textContent=new Set(P.map(p=>p.cat)).size;
  const tv=P.reduce((s,p)=>s+p.rv,0);
  document.getElementById('sV').textContent=tv>=1e9?`$${(tv/1e9).toFixed(1)}B`:`$${Math.round(tv/1e6)}M`;
}

// Add all markers
P.forEach(p=>{
  const m=L.marker([p.la,p.ln],{icon:icon(p.cat,false)}).addTo(map).bindPopup(popup(p),{maxWidth:370,minWidth:310});
  m.on('click',()=>{setActive(p.id);const card=document.querySelector(`.pc[data-id="${p.id}"]`);if(card)card.scrollIntoView({behavior:'smooth',block:'nearest'});});
  m.on('popupclose',()=>{if(activeId===p.id)setActive(null);});
  markers[p.id]=m;
});

// Filters
document.querySelectorAll('.ft').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.ft').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');curCat=tab.dataset.cat;
    const f=filtered();
    P.forEach(p=>{f.find(x=>x.id===p.id)?markers[p.id].addTo(map):markers[p.id].remove();});
    if(curCat==='canada')map.flyTo([54,-100],4,{duration:.8});
    else if(curCat==='federal')map.flyTo([39,-95],5,{duration:.8});
    else if(curCat!=='ALL'){const pts=f.map(p=>[p.la,p.ln]);if(pts.length)map.flyToBounds(L.latLngBounds(pts),{padding:[60,60],duration:.8});}
    else map.flyTo([46,-98],4,{duration:.8});
    buildList();
  });
});

// Search
document.getElementById('si').addEventListener('input',e=>{
  curQ=e.target.value;const f=filtered();
  P.forEach(p=>{f.find(x=>x.id===p.id)?markers[p.id].addTo(map):markers[p.id].remove();});
  buildList();
});

statsUpdate();buildList();
</script>
</body>
</html>
